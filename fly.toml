# fly.toml — configuración para Fly.io
# Reemplaza "indexwebofica" con el nombre que elijas al hacer flyctl launch

app = "app-dry-night-8835"
primary_region = "mad"  # Madrid — cambia según tu preferencia

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
