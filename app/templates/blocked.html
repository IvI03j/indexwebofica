<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Acceso restringido' }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#050505 0%, #090909 100%);
      color:#fff;
      font-family:'DM Sans',sans-serif;
      padding:20px;
    }
    .card{
      max-width:640px;
      width:100%;
      background:#121212;
      border:1px solid #262626;
      border-radius:22px;
      padding:32px;
      text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }
    .icon{
      font-size:3rem;
      margin-bottom:16px;
    }
    h1{
      margin:0 0 10px;
      font-family:'Bebas Neue',sans-serif;
      letter-spacing:1px;
      font-size:2.4rem;
    }
    p{
      color:#cfcfcf;
      line-height:1.7;
      font-size:1rem;
      margin-bottom:12px;
    }
    .badge{
      display:inline-block;
      margin-top:8px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(229,9,20,.1);
      border:1px solid rgba(229,9,20,.25);
      color:#ffd1d4;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Acceso restringido</h1>
    <p>Esta plataforma solo se puede abrir desde la mini app oficial de Telegram.</p>
    <p>Si quieres acceder, entra al bot principal y pulsa en <strong>🌐 Web oficial</strong>.</p>
    <div class="badge">Solo Telegram Mini App autorizado</div>
  </div>
</body>
</html>
